<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAREFINDS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0a0a0a; --bg2:#111; --bg3:#1c1c1c;
  --border:#2a2a2a; --border2:#3d3d3d;
  --text:#f0ede8; --muted:#888;
  --accent:#d4ff00; --danger:#ff4444;
  --font-d:'Syne',sans-serif; --font-m:'Space Mono',monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-d); min-height:100vh; overflow-x:hidden; }
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* HEADER */
header {
  position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border);
  padding:0 2rem; height:68px; display:flex; align-items:center; gap:1rem;
}
.logo { font-family:var(--font-d); font-weight:800; font-size:1.4rem; letter-spacing:-0.03em; color:var(--accent); cursor:pointer; white-space:nowrap; user-select:none; flex-shrink:0; }
.logo span { color:var(--text); }
.header-search { flex:1; position:relative; }
.header-search input {
  width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text);
  padding:0.6rem 1rem 0.6rem 2.5rem; border-radius:8px;
  font-family:var(--font-m); font-size:0.75rem; outline:none; transition:border-color 0.2s;
}
.header-search input:focus { border-color:var(--accent); }
.header-search input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:0.9rem; }

/* SOCIAL ICONS */
.social-links { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
.social-link {
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:8px;
  border:1px solid var(--border); color:var(--muted);
  text-decoration:none; transition:all 0.2s; flex-shrink:0;
}
.social-link:hover { border-color:var(--accent); color:var(--accent); }
.social-link svg { width:16px; height:16px; fill:currentColor; }

.header-actions { display:flex; gap:0.6rem; flex-shrink:0; align-items:center; }
.btn-accent {
  background:var(--accent); border:none; color:var(--bg);
  font-family:var(--font-m); font-size:0.7rem; font-weight:700; letter-spacing:0.08em;
  padding:0.55rem 1.1rem; cursor:pointer; border-radius:8px; white-space:nowrap; transition:opacity 0.2s;
}
.btn-accent:hover { opacity:0.85; }
.btn-outline {
  background:none; border:1px solid var(--border2); color:var(--muted);
  font-family:var(--font-m); font-size:0.7rem; letter-spacing:0.08em;
  padding:0.55rem 1.1rem; cursor:pointer; border-radius:8px; white-space:nowrap; transition:all 0.2s;
}
.btn-outline:hover { border-color:var(--text); color:var(--text); }

/* CATEGORY BAR */
.cat-wrap { border-bottom:1px solid var(--border); background:var(--bg); padding:0 2rem; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; }
.cat-wrap::-webkit-scrollbar { display:none; }
.cat-tab {
  font-family:var(--font-m); font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--muted); padding:0.85rem 1.3rem; cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:color 0.2s,border-color 0.2s;
  background:none; border-top:none; border-left:none; border-right:none; flex-shrink:0;
}
.cat-tab:hover { color:var(--text); }
.cat-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* TOOLBAR */
.toolbar { display:flex; align-items:center; justify-content:space-between; padding:1.5rem 2rem 0.75rem; gap:1rem; }
.result-count { font-family:var(--font-m); font-size:0.7rem; color:var(--muted); }
.result-count strong { color:var(--text); }
.sort-select {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  padding:0.5rem 0.9rem; font-family:var(--font-m); font-size:0.7rem;
  border-radius:8px; outline:none; cursor:pointer;
}
.sort-select:focus { border-color:var(--accent); }

/* GRID */
.product-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:16px; padding:0 2rem 2rem;
}

/* CARD */
.product-card {
  background:var(--bg2); border-radius:14px; overflow:hidden;
  text-decoration:none; color:inherit; display:block;
  border:1px solid var(--border); transition:border-color 0.2s, transform 0.2s;
  position:relative;
}
.product-card:hover { border-color:var(--border2); transform:translateY(-3px); }
.product-image-wrap { aspect-ratio:1/1; overflow:hidden; position:relative; background:var(--bg3); }
.product-img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; display:block; }
.product-card:hover .product-img { transform:scale(1.05); }
.product-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; opacity:0.12; transition:transform 0.4s ease; }
.product-card:hover .product-placeholder { transform:scale(1.05); }

.product-badge {
  position:absolute; top:0.65rem; left:0.65rem;
  font-family:var(--font-m); font-size:0.6rem; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase; padding:0.22rem 0.5rem; border-radius:6px;
}
.badge-rare { background:var(--accent); color:var(--bg); }
.badge-new  { background:var(--text); color:var(--bg); }

.card-actions {
  position:absolute; top:0.65rem; right:0.65rem;
  display:none; gap:0.3rem; z-index:10;
}
body.admin-mode .card-actions { display:flex; opacity:0; transition:opacity 0.2s; }
body.admin-mode .product-card:hover .card-actions { opacity:1; }
.card-action-btn {
  background:rgba(10,10,10,0.85); border:1px solid var(--border2); color:var(--muted);
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:7px; font-size:0.85rem; transition:all 0.15s;
}
.card-action-btn.edit-btn:hover { color:var(--accent); border-color:var(--accent); }
.card-action-btn.del-btn:hover  { color:var(--danger); border-color:var(--danger); }

.ext-label {
  position:absolute; bottom:0.65rem; right:0.65rem;
  background:rgba(10,10,10,0.82); border:1px solid var(--border2);
  font-family:var(--font-m); font-size:0.55rem; letter-spacing:0.05em;
  padding:0.2rem 0.45rem; border-radius:6px; color:var(--muted);
  opacity:0; transition:opacity 0.2s;
}
.product-card:hover .ext-label { opacity:1; }

.product-info { padding:1rem; }
.product-brand { font-family:var(--font-m); font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:0.3rem; }
.product-name { font-size:1rem; font-weight:700; line-height:1.2; letter-spacing:-0.02em; margin-bottom:0.5rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.product-footer { display:flex; align-items:center; justify-content:space-between; }
.product-price { font-family:var(--font-m); font-size:0.95rem; font-weight:700; }
.product-price-orig { font-family:var(--font-m); font-size:0.75rem; color:var(--muted); text-decoration:line-through; margin-right:0.35rem; }
.product-cond { font-family:var(--font-m); font-size:0.58rem; color:var(--muted); background:var(--bg3); padding:0.2rem 0.5rem; border-radius:5px; }

/* LOADING */
.loading-state { text-align:center; padding:6rem 2rem; grid-column:1/-1; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-state p { font-family:var(--font-m); color:var(--muted); font-size:0.7rem; }

/* LOAD MORE */
.load-more-wrap { display:flex; justify-content:center; padding:1rem 2rem 3rem; }
.load-more-btn {
  background:none; border:1px solid var(--border2); color:var(--muted);
  font-family:var(--font-m); font-size:0.7rem; letter-spacing:0.08em;
  padding:0.75rem 2rem; cursor:pointer; border-radius:9px; transition:all 0.2s;
}
.load-more-btn:hover { border-color:var(--accent); color:var(--accent); }
.load-more-sentinel { height:1px; }

/* EMPTY */
.empty-state { text-align:center; padding:6rem 2rem; grid-column:1/-1; }
.empty-state .big { font-size:1.8rem; font-weight:800; margin-bottom:0.6rem; }
.empty-state p { font-family:var(--font-m); color:var(--muted); font-size:0.72rem; line-height:1.6; }

/* MODALS */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:300; align-items:center; justify-content:center; padding:1rem; }
.overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border2); width:100%; max-width:520px; border-radius:16px; overflow:hidden; max-height:90vh; overflow-y:auto; }
.modal-sm { max-width:420px; }
.modal-header { padding:1.4rem 1.6rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--bg2); z-index:1; }
.modal-title { font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; }
.modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.2rem; line-height:1; transition:color 0.2s; padding:0.2rem; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:1.5rem 1.6rem; display:flex; flex-direction:column; gap:1rem; }
.modal-footer { padding:1rem 1.6rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; justify-content:flex-end; }

/* FORM */
.field { display:flex; flex-direction:column; gap:0.45rem; }
.field label { font-family:var(--font-m); font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.field input, .field select {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  padding:0.65rem 0.85rem; font-family:var(--font-m); font-size:0.78rem;
  border-radius:9px; outline:none; transition:border-color 0.2s; width:100%;
}
.field input:focus, .field select:focus { border-color:var(--accent); }
.field input::placeholder { color:var(--muted); }
.field select option { background:var(--bg3); }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:0.85rem; }

/* Upload */
.upload-zone {
  border:2px dashed var(--border2); border-radius:10px; padding:1.2rem;
  display:flex; flex-direction:column; align-items:center; gap:0.5rem;
  cursor:pointer; transition:border-color 0.2s; position:relative; overflow:hidden; text-align:center;
}
.upload-zone:hover { border-color:var(--accent); }
.upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-zone .uz-label { font-family:var(--font-m); font-size:0.66rem; color:var(--muted); pointer-events:none; }
.upload-zone .uz-sub { font-family:var(--font-m); font-size:0.58rem; color:var(--border2); pointer-events:none; }
.img-preview { width:72px; height:72px; object-fit:cover; border-radius:8px; display:none; }

/* Cat list */
.cat-list { display:flex; flex-direction:column; gap:0.5rem; max-height:220px; overflow-y:auto; }
.cat-item { display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border:1px solid var(--border); border-radius:9px; padding:0.65rem 0.9rem; }
.cat-item-name { font-size:0.88rem; font-weight:600; }
.cat-item-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; transition:color 0.2s; line-height:1; padding:0.1rem 0.3rem; border-radius:5px; }
.cat-item-del:hover { color:var(--danger); }
.cat-add-row { display:flex; gap:0.5rem; }
.cat-add-row input { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:0.6rem 0.8rem; font-family:var(--font-m); font-size:0.76rem; border-radius:9px; outline:none; transition:border-color 0.2s; }
.cat-add-row input:focus { border-color:var(--accent); }
.cat-add-row input::placeholder { color:var(--muted); }
.cat-add-row button { background:var(--accent); border:none; color:var(--bg); font-family:var(--font-m); font-size:0.7rem; font-weight:700; padding:0 1rem; border-radius:9px; cursor:pointer; transition:opacity 0.2s; white-space:nowrap; }
.cat-add-row button:hover { opacity:0.85; }

/* Social links in settings modal */
.social-fields { display:flex; flex-direction:column; gap:0.75rem; }
.social-field-row { display:flex; align-items:center; gap:0.75rem; }
.social-field-icon { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid var(--border); flex-shrink:0; color:var(--muted); }
.social-field-icon svg { width:16px; height:16px; fill:currentColor; }

/* Buttons */
.btn-save { background:var(--accent); border:none; color:var(--bg); font-family:var(--font-m); font-size:0.72rem; font-weight:700; letter-spacing:0.08em; padding:0.65rem 1.5rem; cursor:pointer; border-radius:9px; transition:opacity 0.2s; }
.btn-save:hover { opacity:0.85; }
.btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); font-family:var(--font-m); font-size:0.72rem; letter-spacing:0.08em; padding:0.65rem 1.2rem; cursor:pointer; border-radius:9px; transition:all 0.2s; }
.btn-cancel:hover { border-color:var(--border2); color:var(--text); }

/* TOAST */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:var(--bg); font-family:var(--font-m); font-size:0.7rem; font-weight:700; letter-spacing:0.1em; padding:0.7rem 1.6rem; border-radius:10px; z-index:500; transition:transform 0.3s ease; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* ── MOBILE ── */
@media(max-width:640px){

  /* Header : logo + icônes sociales sur ligne 1, recherche sur ligne 2 */
  header {
    height:auto;
    flex-wrap:wrap;
    padding:0.75rem 1rem;
    gap:0.6rem;
  }
  .logo { font-size:1.2rem; }
  .header-search {
    order:3;
    flex:0 0 100%;
    max-width:100%;
  }
  .social-links {
    gap:0.3rem;
    margin-left:auto;
  }
  .social-link { width:30px; height:30px; border-radius:7px; }
  .social-link svg { width:14px; height:14px; }
  /* 430€ bouton plus compact */
  #sl-coupons { padding:0 0.45rem !important; font-size:0.55rem !important; height:30px; }

  /* Boutons admin plus compacts */
  .header-actions { gap:0.4rem; }
  .btn-accent, .btn-outline { padding:0.45rem 0.7rem; font-size:0.62rem; }

  /* Catégories */
  .cat-wrap { padding:0 0.75rem; }
  .cat-tab { font-size:0.62rem; padding:0.75rem 0.9rem; }

  /* Toolbar */
  .toolbar { padding:1rem 1rem 0.6rem; }
  .result-count { font-size:0.65rem; }
  .sort-select { font-size:0.65rem; padding:0.4rem 0.6rem; }

  /* Grille : 2 colonnes fixes sur mobile */
  .product-grid {
    grid-template-columns: 1fr 1fr;
    gap:10px;
    padding:0 1rem 2rem;
  }

  /* Cartes : infos plus compactes */
  .product-info { padding:0.65rem; }
  .product-name { font-size:0.82rem; }
  .product-brand { font-size:0.55rem; }
  .product-price { font-size:0.8rem; }
  .product-price-orig { font-size:0.65rem; }
  .product-cond { font-size:0.5rem; padding:0.15rem 0.35rem; }

  /* Boutons edit/delete toujours visibles sur mobile (pas de hover) */
  body.admin-mode .card-actions { opacity:1 !important; display:flex !important; }

  /* Modals plein écran sur mobile */
  .overlay { padding:0; align-items:flex-end; }
  .modal {
    max-width:100%;
    width:100%;
    border-radius:16px 16px 0 0;
    max-height:92vh;
  }
  .modal-sm { max-width:100%; }
  .field-row { grid-template-columns:1fr; }

  /* Load more */
  .load-more-wrap { padding:0.75rem 1rem 2.5rem; }

  /* Toast plus grand sur mobile */
  .toast { font-size:0.75rem; padding:0.8rem 1.4rem; bottom:1.5rem; }
}

/* Très petits écrans */
@media(max-width:360px){
  .product-grid { grid-template-columns:1fr 1fr; gap:8px; padding:0 0.75rem 2rem; }
  .logo { font-size:1rem; }
}
</style>
</head>

  <div class="header-search">

  <div class="header-actions" id="header-actions"></div>
</header>

  <span class="result-count" id="result-count"></span>
  <select class="sort-select" onchange="handleSort(this.value)">
    <option value="default">Trier par</option>
    <option value="newest">Nouveautés</option>
    <option value="price-asc">Prix ↑</option>
    <option value="price-desc">Prix ↓</option>
    <option value="name-asc">Nom A–Z</option>

<div class="product-grid" id="product-grid">

<div class="overlay" id="login-overlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Accès</span>

      <div class="field">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="ton@email.com" onkeydown="if(event.key==='Enter')checkPassword()">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="f-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
      </div>
      <p id="pwd-error" style="font-family:var(--font-m);font-size:0.68rem;color:#ff4444;display:none;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeLoginModal()">Annuler</button>
      <button class="btn-save" id="login-btn" onclick="checkPassword()">Connexion</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrhy9r3Um4rn9Edwjbva5YKfxVSgP-aNM",
  authDomain: "randomfinds.firebaseapp.com",
  projectId: "randomfinds",
  storageBucket: "randomfinds.firebasestorage.app",
  messagingSenderId: "216557684349",
  appId: "1:216557684349:web:0a0e45098f5a73c8139314"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const COLORS = ['#c8b89a','#9ab4c8','#c8c8a9','#d4b8c8','#a9c8b8','#c8b0a0','#b8c8d4','#d4c8a9'];
const fmt = n => parseFloat(n).toFixed(2);

let products   = [];
let categories = [];
let editingId  = null;
let pendingImg = null;
let isAdmin    = false;
let socialLinks = { tiktok:'', instagram:'', telegram:'', coupons:'' };
let ui = { category:'Tous', search:'', sort:'default', visibleCount:12, batchSize:12 };

// ── INFINITE SCROLL ──
let observer = null;
function setupObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      ui.visibleCount += ui.batchSize;
      renderProducts();
    }
  }, { rootMargin:'200px' });
  const sentinel = document.getElementById('sentinel');
  if (sentinel) observer.observe(sentinel);
}

// ── ADMIN ──
let logoClics = 0, logoTimer = null;
document.getElementById('logo').addEventListener('click', () => {
  if (isAdmin) { clearFilters(); return; }
  logoClics++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => logoClics = 0, 600);
  if (logoClics >= 3) { logoClics = 0; openLoginModal(); }
  else clearFilters();
});

onAuthStateChanged(auth, user => {
  if (user) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('header-actions').innerHTML = `
      <button class="btn-outline" onclick="openSocialModal()">🔗 Réseaux</button>
      <button class="btn-outline" onclick="openCatModal()">🗂 Catégories</button>
      <button class="btn-accent" onclick="openAddModal()">+ Ajouter</button>
      <button class="btn-outline" onclick="logoutAdmin()" style="border-color:#ff4444;color:#ff4444;">Quitter</button>`;
    renderProducts();
  } else {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('header-actions').innerHTML = '';
    renderProducts();
  }
});

function openLoginModal() {
  document.getElementById('f-email').value = '';
  document.getElementById('f-pwd').value   = '';
  document.getElementById('pwd-error').style.display = 'none';
  document.getElementById('login-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('f-email').focus(), 100);
}
function closeLoginModal() { document.getElementById('login-overlay').classList.remove('open'); document.body.style.overflow=''; }
window.closeLoginModal = closeLoginModal;

async function checkPassword() {
  const email = document.getElementById('f-email').value.trim();
  const pwd   = document.getElementById('f-pwd').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('pwd-error');
  err.style.display='none'; btn.textContent='…'; btn.disabled=true;
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
    closeLoginModal(); toast('Mode admin activé ✓');
  } catch(e) {
    err.textContent='Email ou mot de passe incorrect.'; err.style.display='block';
    document.getElementById('f-pwd').value=''; document.getElementById('f-pwd').focus();
  } finally { btn.textContent='Connexion'; btn.disabled=false; }
}
window.checkPassword = checkPassword;

async function logoutAdmin() { await signOut(auth); toast('Déconnecté'); }
window.logoutAdmin = logoutAdmin;

// ── SOCIAL LINKS ──
async function loadSocialLinks() {
  try {
    const snap = await getDoc(doc(db, 'config', 'social'));
    if (snap.exists()) socialLinks = { ...socialLinks, ...snap.data() };
  } catch(e) {}
  applySocialLinks();
}

function applySocialLinks() {
  ['tiktok','instagram','telegram','coupons'].forEach(k => {
    const el = document.getElementById('sl-'+k);
    if (el) el.href = socialLinks[k] || '#';
  });
}

function openSocialModal() {
  document.getElementById('sl-tiktok-input').value    = socialLinks.tiktok    || '';
  document.getElementById('sl-instagram-input').value = socialLinks.instagram || '';
  document.getElementById('sl-telegram-input').value  = socialLinks.telegram  || '';
  document.getElementById('sl-coupons-input').value   = socialLinks.coupons   || '';
  document.getElementById('social-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSocialModal() { document.getElementById('social-overlay').classList.remove('open'); document.body.style.overflow=''; }
window.openSocialModal  = openSocialModal;
window.closeSocialModal = closeSocialModal;

async function saveSocialLinks() {
  socialLinks = {
    tiktok:    document.getElementById('sl-tiktok-input').value.trim(),
    instagram: document.getElementById('sl-instagram-input').value.trim(),
    telegram:  document.getElementById('sl-telegram-input').value.trim(),
    coupons:   document.getElementById('sl-coupons-input').value.trim(),
  };
  await setDoc(doc(db, 'config', 'social'), socialLinks);
  applySocialLinks();
  closeSocialModal();
  toast('Liens mis à jour ✓');
}
window.saveSocialLinks = saveSocialLinks;

// ── FIRESTORE LISTENERS ──
onSnapshot(query(collection(db, 'products'), orderBy('createdAt','desc')), snap => {
  products = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderProducts();
});

onSnapshot(doc(db, 'config', 'categories'), snap => {
  categories = snap.exists() ? (snap.data().list || []) : [];
  renderCats();
});

loadSocialLinks();

// ── CATEGORIES ──
function renderCats() {
  const tabs = ['Tous', ...categories];
  document.getElementById('cat-wrap').innerHTML = tabs.map(c =>
    `<button class="cat-tab ${c===ui.category?'active':''}" onclick="setCategory('${c.replace(/'/g,"\\'")}')">
      ${c}
    </button>`).join('');
  const sel = document.getElementById('f-category');
  if (sel) {
    const prev = sel.value;
    sel.innerHTML = '<option value="">— Choisir —</option>' +
      categories.map(c => `<option value="${c}" ${c===prev?'selected':''}>${c}</option>`).join('');
  }
  document.getElementById('cat-list').innerHTML = categories.length
    ? categories.map((c,i) => `
        <div class="cat-item">
          <span class="cat-item-name">${c}</span>
          <button class="cat-item-del" data-index="${i}">✕</button>
        </div>`).join('')
    : `<p style="font-family:var(--font-m);font-size:0.7rem;color:var(--muted);text-align:center;padding:1rem;">Aucune catégorie</p>`;
  document.getElementById('cat-list').querySelectorAll('.cat-item-del').forEach(btn => {
    btn.addEventListener('click', () => deleteCategory(parseInt(btn.dataset.index)));
  });
}

async function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name  = input.value.trim();
  if (!name) return;
  if (categories.map(c=>c.toLowerCase()).includes(name.toLowerCase())) { toast('Catégorie déjà existante'); return; }
  const newList = [...categories, name];
  await setDoc(doc(db,'config','categories'), { list: newList }, { merge:true });
  input.value=''; toast(`"${name}" ajouté ✓`);
}
window.addCategory = addCategory;

async function deleteCategory(i) {
  const newList = categories.filter((_,idx) => idx !== i);
  await setDoc(doc(db,'config','categories'), { list: newList });
  if (ui.category === categories[i]) ui.category = 'Tous';
  toast('Catégorie supprimée');
}

function openCatModal()  { renderCats(); document.getElementById('cat-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeCatModal() { document.getElementById('cat-overlay').classList.remove('open'); document.body.style.overflow=''; }
window.openCatModal  = openCatModal;
window.closeCatModal = closeCatModal;

// ── PRODUCTS ──
function getFiltered() {
  let items = [...products];
  if (ui.category !== 'Tous') items = items.filter(p => p.category === ui.category);
  if (ui.search) {
    const q = ui.search.toLowerCase();
    items = items.filter(p => (p.name||'').toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q));
  }
  if (ui.sort==='price-asc')  items.sort((a,b)=>a.price-b.price);
  if (ui.sort==='price-desc') items.sort((a,b)=>b.price-a.price);
  if (ui.sort==='name-asc')   items.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  return items;
}

function renderProducts() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const visible  = filtered.slice(0, ui.visibleCount);
  const hasMore  = ui.visibleCount < total;

  document.getElementById('result-count').innerHTML = `<strong>${total}</strong> produit${total!==1?'s':''}`;
  const grid = document.getElementById('product-grid');

  if (!total) {
    grid.innerHTML = `<div class="empty-state"><div class="big">${products.length?'0 résultats':'Aucun produit'}</div><p>${products.length?"Essaie d'autres filtres.":'Connecte-toi en admin pour ajouter des produits.'}</p></div>`;
    document.getElementById('load-more-wrap').style.display='none';
    return;
  }

  grid.innerHTML = visible.map(cardHTML).join('');
  document.getElementById('load-more-wrap').style.display = hasMore ? 'flex' : 'none';
  if (hasMore) setupObserver(); else if (observer) observer.disconnect();

  grid.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); editProduct(btn.dataset.id); }));
  grid.querySelectorAll('.del-btn').forEach(btn  => btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); deleteProduct(btn.dataset.id); }));
}

function cardHTML(p) {
  const colorIdx = Math.abs((p.id.charCodeAt(0)||0) + (p.id.charCodeAt(1)||0)) % COLORS.length;
  const badge    = p.badge ? `<span class="product-badge badge-${p.badge}">${p.badge==='rare'?'🔥 Rare':'New'}</span>` : '';
  const origPx   = p.original ? `<span class="product-price-orig">€${fmt(p.original)}</span>` : '';
  let   siteLabel = p.url||'';
  try { siteLabel = new URL(p.url).hostname.replace('www.',''); } catch(e){}
  const imgHTML  = p.image
    ? `<img class="product-img" src="${p.image}" alt="${p.name||''}" loading="lazy">`
    : `<div class="product-placeholder" style="background:${COLORS[colorIdx]};">◈</div>`;

  return `
  <a class="product-card" href="${p.url}" target="_blank" rel="noopener noreferrer">
    <div class="product-image-wrap">
      ${imgHTML}
      ${badge}
      <span class="ext-label">↗ ${siteLabel}</span>
      <div class="card-actions">
        <button class="card-action-btn edit-btn" data-id="${p.id}" title="Modifier">✎</button>
        <button class="card-action-btn del-btn"  data-id="${p.id}" title="Supprimer">✕</button>
      </div>
    </div>
    <div class="product-info">
      <div class="product-brand">${p.brand||''}</div>
      <div class="product-name">${p.name||''}</div>
      <div class="product-footer">
        <div>${origPx}<span class="product-price">${p.price!=null?'€'+fmt(p.price):''}</span></div>
        <span class="product-cond">${p.condition||''}</span>
      </div>
    </div>
  </a>`;
}

// CRUD
async function saveProduct() {
  const name     = document.getElementById('f-name').value.trim();
  const brand    = document.getElementById('f-brand').value.trim();
  const category = document.getElementById('f-category').value;
  const price    = parseFloat(document.getElementById('f-price').value);
  const url      = document.getElementById('f-url').value.trim();
  if (!name)              { toast('❌ Nom requis'); return; }
  if (!brand)             { toast('❌ Marque requise'); return; }
  if (!category)          { toast('❌ Catégorie requise'); return; }
  if (isNaN(price)||price<0){ toast('❌ Prix invalide'); return; }
  if (!url)               { toast('❌ Lien requis'); return; }
  const original  = parseFloat(document.getElementById('f-original').value) || null;
  const condition = document.getElementById('f-condition').value;
  const badge     = document.getElementById('f-badge').value || null;
  let   image     = pendingImg;
  const urlImg    = document.getElementById('f-image-url').value.trim();
  if (!image && urlImg) image = urlImg;
  const btn = document.getElementById('save-btn');
  btn.textContent='…'; btn.disabled=true;
  try {
    if (editingId) {
      await updateDoc(doc(db,'products',editingId), { name,brand,category,price,original,condition,badge,url,image:image||null });
      toast('Produit modifié ✓');
    } else {
      await addDoc(collection(db,'products'), { name,brand,category,price,original,condition,badge,url,image:image||null,createdAt:Date.now() });
      toast('Produit ajouté ✓');
    }
    closeProductModal();
  } catch(e) { toast('❌ Erreur : '+e.message); }
  finally { btn.textContent='Enregistrer'; btn.disabled=false; }
}
window.saveProduct = saveProduct;

async function deleteProduct(id) {
  try { await deleteDoc(doc(db,'products',id)); toast('Produit supprimé'); }
  catch(e) { toast('❌ Erreur : '+e.message); }
}

function editProduct(id) {
  const p = products.find(x => x.id===id); if (!p) return;
  editingId=id; pendingImg=p.image||null;
  document.getElementById('product-modal-title').textContent='Modifier le produit';
  document.getElementById('f-name').value      = p.name||'';
  document.getElementById('f-brand').value     = p.brand||'';
  renderCats();
  document.getElementById('f-category').value  = p.category||'';
  document.getElementById('f-condition').value = p.condition||'Neuf';
  document.getElementById('f-price').value     = p.price??'';
  document.getElementById('f-original').value  = p.original||'';
  document.getElementById('f-url').value       = p.url||'';
  document.getElementById('f-badge').value     = p.badge||'';
  document.getElementById('f-image-url').value = '';
  const prev=document.getElementById('img-preview');
  if (p.image) { prev.src=p.image; prev.style.display='block'; document.getElementById('uz-label').textContent='✓ Image chargée'; document.getElementById('uz-sub').style.display='none'; }
  else { prev.style.display='none'; document.getElementById('uz-label').textContent='📁 Cliquer pour uploader'; document.getElementById('uz-sub').style.display='block'; }
  document.getElementById('product-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function openAddModal() {
  editingId=null; pendingImg=null;
  document.getElementById('product-modal-title').textContent='Ajouter un produit';
  ['f-name','f-brand','f-price','f-original','f-url','f-image-url'].forEach(id=>document.getElementById(id).value='');
  renderCats();
  document.getElementById('f-category').value='';
  document.getElementById('f-condition').value='Neuf';
  document.getElementById('f-badge').value='';
  document.getElementById('f-image').value='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('uz-label').textContent='📁 Cliquer pour uploader';
  document.getElementById('uz-sub').style.display='block';
  document.getElementById('product-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
window.openAddModal=openAddModal;

function closeProductModal() { document.getElementById('product-overlay').classList.remove('open'); document.body.style.overflow=''; }
window.closeProductModal=closeProductModal;

function handleImageUpload(input) {
  const file=input.files[0]; if (!file) return;
  if (file.size>5*1024*1024) { toast('❌ Image trop lourde (max 5 Mo)'); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImg=e.target.result;
    const prev=document.getElementById('img-preview');
    prev.src=pendingImg; prev.style.display='block';
    document.getElementById('uz-label').textContent='✓ '+file.name;
    document.getElementById('uz-sub').style.display='none';
    document.getElementById('f-image-url').value='';
  };
  reader.readAsDataURL(file);
}
window.handleImageUpload=handleImageUpload;

function handleImageUrl(val) {
  if (!val) return; pendingImg=null;
  const prev=document.getElementById('img-preview');
  prev.src=val; prev.style.display='block';
  document.getElementById('uz-label').textContent='✓ URL utilisée';
  document.getElementById('uz-sub').style.display='none';
}
window.handleImageUrl=handleImageUrl;

function setCategory(c) { ui.category=c; ui.visibleCount=ui.batchSize; renderCats(); renderProducts(); }
window.setCategory=setCategory;
function handleSearch(v) { ui.search=v; ui.visibleCount=ui.batchSize; renderProducts(); }
window.handleSearch=handleSearch;
function handleSort(v)   { ui.sort=v; ui.visibleCount=ui.batchSize; renderProducts(); }
window.handleSort=handleSort;
function clearFilters()  { ui.category='Tous'; ui.search=''; ui.visibleCount=ui.batchSize; document.getElementById('search-input').value=''; renderCats(); renderProducts(); }

let toastT;
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeProductModal(); closeCatModal(); closeSocialModal(); closeLoginModal(); }
});
document.getElementById('product-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('product-overlay')) closeProductModal(); });
document.getElementById('cat-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('cat-overlay')) closeCatModal(); });
document.getElementById('social-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('social-overlay')) closeSocialModal(); });
document.getElementById('login-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('login-overlay')) closeLoginModal(); });
</script>
</body>
</html>
